<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  :root{
    --bg:#0f1117; --panel:#171a23; --line:#262b38; --txt:#e7eaf0; --mut:#8a91a3;
    --safe:#2ecc71; --low:#f1c40f; --med:#e67e22; --high:#e74c3c; --accent:#5b8cff;
  }
  *{box-sizing:border-box;font-family:-apple-system,Segoe UI,Roboto,sans-serif}
  body{width:360px;margin:0;background:var(--bg);color:var(--txt);font-size:13px}
  header{padding:14px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px}
  header h1{font-size:14px;margin:0;font-weight:600}
  header .dot{width:9px;height:9px;border-radius:50%;background:var(--accent)}
  .body{padding:14px 16px}
  textarea{width:100%;min-height:90px;resize:vertical;background:var(--panel);
    border:1px solid var(--line);border-radius:8px;color:var(--txt);padding:9px;font-size:12px}
  .row{display:flex;gap:8px;margin-top:10px}
  button{flex:1;padding:9px;border:none;border-radius:8px;background:var(--accent);
    color:#fff;font-weight:600;cursor:pointer;font-size:12px}
  button.ghost{background:var(--panel);border:1px solid var(--line);color:var(--txt)}
  .gauge{margin-top:14px;text-align:center;display:none}
  .gauge.show{display:block}
  .score{font-size:34px;font-weight:700;margin:4px 0}
  .verdict{font-size:13px;font-weight:600;padding:4px 12px;border-radius:20px;display:inline-block}
  .bar{height:8px;border-radius:6px;background:var(--line);margin:12px 0 6px;overflow:hidden}
  .bar>span{display:block;height:100%;transition:width .4s}
  .lex{margin-top:12px;display:flex;flex-wrap:wrap;gap:5px}
  .tag{background:var(--panel);border:1px solid var(--line);border-radius:6px;
    padding:3px 8px;font-size:11px;color:var(--mut)}
  .tag b{color:var(--txt)}
  .feat{margin-top:10px;font-size:11px;color:var(--mut)}
  .feat div{display:flex;justify-content:space-between;padding:2px 0;border-bottom:1px solid var(--line)}
  footer{padding:8px 16px;border-top:1px solid var(--line);color:var(--mut);font-size:10px;text-align:center}
</style>
</head>
<body>
  <header><span class="dot"></span><h1>MSRAN+XGB Phishing Detector</h1></header>
  <div class="body">
    <textarea id="input" placeholder="Paste an email or URL — or click 'Scan current tab'."></textarea>
    <div class="row">
      <button id="scan">Analyze</button>
      <button id="tab" class="ghost">Scan current tab</button>
    </div>
    <div class="gauge" id="gauge">
      <div class="verdict" id="verdict">—</div>
      <div class="score" id="score">—</div>
      <div class="bar"><span id="barfill"></span></div>
      <div class="lex" id="lex"></div>
      <div class="feat" id="feat"></div>
    </div>
  </div>
  <footer>Runs fully offline. No data leaves your browser.</footer>
  <script src="model-bundle.js"></script>
  <script src="features.js"></script>
  <script src="model.js"></script>
  <script src="popup.js"></script>
</body>
</html>
